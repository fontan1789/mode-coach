: "Après 1♣, que signifie 1SA ?", "a": ["6–9 H avec fit club", "7–10 H équilibrée sans couleur 4e intéressante", "11–12 H invitation", "13–15 H manche directe"], "c": 1, "e": "Le tableau donne 1SA = 7–10 H équilibrée, pas de couleur 4e intéressante.", "tip": "Ne monte pas trop vite à SA : 2SA et 3SA ont d’autres plages."}, {"q": "Après 1♣, que montre 2♣ ?", "a": ["Soutien trèfle 3+, 6–9 H, constructif", "Soutien fort club, forcing un tour", "Forcing manche avec 5+ clubs", "Invitation régulière"], "c": 0, "e": "2♣ = soutien trèfle 3+, constructif, 6–9 H.", "tip": "Fais la différence entre 2♣ constructif et 3♣ soutien fort."}, {"q": "Après 1♣, que montrent 2♦ / 2♥ / 2♠ ?", "a": ["Barrage constructif", "10+ H, 5+ couleur, forcing manche", "Réponses naturelles faibles", "Question artificielle"], "c": 1, "e": "Le document dit : 10+ H, 5+ couleur, forcing manche.", "tip": "Repère expert : ces sauts changent immédiatement de zone de force."}, {"q": "Après 1♣, que signifie 2SA ?", "a": ["8–9 H invitation", "11–12 H équilibrée, invitation", "13–15 H réguliers", "Gerber"], "c": 1, "e": "2SA = 11–12 H équilibrée, invitation.", "tip": "La ligne des SA sur 1♣ est très structurée : 1SA / 2SA / 3SA."}, {"q": "Après 1♣, que signifie 3♣ ?", "a": ["Soutien faible de barrage", "Soutien fort 4+, 10–12 H, forcing un tour", "Soutien forcing manche", "Main régulière maximum"], "c": 1, "e": "3♣ = soutien fort 4+, 10–12 H, forcing un tour.", "tip": "C’est un appel fort de fit, pas un simple soutien de sécurité."}, {"q": "Après 1♣, que signifie 3SA ?", "a": ["Invitation à SA", "Manche directe 13–15 H équilibrée", "Quantitative", "Demande d’As"], "c": 1, "e": "3SA sur 1♣ = 13–15 H équilibrée, manche directe.", "tip": "Le document réserve explicitement 3SA à la manche directe régulière."}, {"q": "Quelle promesse minimale est donnée pour l’ouverture 1♦ ?", "a": ["3 cartes", "4 cartes", "5 cartes", "6 cartes"], "c": 1, "e": "Le texte sur 1♦ précise : 4 cartes minimum en carreaux.", "tip": "Le document n’emploie pas ici une mineure longue obligatoire à 5 cartes."}, {"q": "Après 1♦, que montre 1♥ ?", "a": ["4+ cœurs, 6+ H, forcing 1 ronde", "5+ cœurs, forcing manche", "Soutien faible carreau", "Main équilibrée"], "c": 0, "e": "1♥ sur 1♦ = 4+ cœurs, 6+ H, forcing 1 ronde.", "tip": "Répondre en majeure reste prioritaire quand c’est possible."}, {"q": "Après 1♦, que montre 1♠ ?", "a": ["4+ piques, 6+ H, forcing 1 ronde", "5+ piques, barrage", "Question artificielle", "Soutien fort carreau"], "c": 0, "e": "1♠ sur 1♦ = 4+ piques, 6+ H, forcing 1 ronde.", "tip": "Même logique qu’après 1♣."}, {"q": "Après 1♦, que signifie 1SA ?", "a": ["7–10 H équilibrée sans majeure 4e", "11–12 H équilibrée", "Soutien faible carreau", "Main de manche"], "c": 0, "e": "Le document précise : 7–10 H équilibrée, pas de majeure 4e.", "tip": "Pense “pas de majeure 4e” plutôt que “pas de couleur 4e intéressante”."}, {"q": "Après 1♦, que montre 2♣ ?", "a": ["6–9 H avec 3 clubs", "10+ H, 5+ trèfles, forcing", "Main équilibrée d’invitation", "Barrage"], "c": 1, "e": "2♣ sur 1♦ = 10+ H, 5+ trèfles, forcing.", "tip": "Ici on ne parle pas de forcing manche explicite, mais bien d’une séquence forte."}, {"q": "Après 1♦, que signifie 2♦ ?", "a": ["Soutien fort d’invitation", "Soutien faible 3+ carreaux, 6–9 H", "Forcing manche", "Main régulière"], "c": 1, "e": "2♦ = 3+ carreaux, soutien limite basse, 6–9 H.", "tip": "Ce n’est pas une mineure inversée, qui apparaît plus loin dans les principes généraux."}, {"q": "Après 1♦, que montrent 2♥ / 2♠ ?", "a": ["4 cartes et forcing", "6+ majeure, 6–9 H, constructif", "5+ couleur forcing manche", "Soutien carreau avec singleton"], "c": 1, "e": "Le tableau donne 6+ majeure, 6–9 H, constructif.", "tip": "Le caractère constructif compense la faiblesse relative en points."}, {"q": "Après 1♦, que signifie 2SA ?", "a": ["À jouer", "Invitation équilibrée 11–12 H", "Manche directe", "Quantitatif"], "c": 1, "e": "2SA = équilibrée, invitation, 11–12 H.", "tip": "Même logique d’échelle que sur 1♣."}, {"q": "Après 1♦, que signifie 3♦ ?", "a": ["Barrage faible", "Soutien fort, invitation manche", "Forcing manche immédiat", "Contrôle"], "c": 1, "e": "3♦ = soutien fort, invitation manche, 10–12 H.", "tip": "Le document emploie l’idée d’inviter la manche plutôt que de l’imposer."}, {"q": "Après 1♦, que signifie 3SA ?", "a": ["8–9 H réguliers", "11–12 H réguliers", "13–15 H équilibrée, manche directe", "17–18 H réguliers"], "c": 2, "e": "3SA sur 1♦ = 13–15 H équilibrée, manche directe.", "tip": "Garde la cohérence de zone avec 3SA sur 1♣."}, {"q": "Dans la section 1♥ / 1♠, quelle longueur minimale est finalement retenue ?", "a": ["4 cartes", "5 cartes", "6 cartes", "variable selon la vulnérabilité"], "c": 1, "e": "La section 2.3 précise que les majeures sont à 5 cartes minimum.", "tip": "Même si les principes généraux évoquent des majeures 5e non obligatoires, la section pratique retient 5+."}, {"q": "Après 1♥, que montre 1♠ ?", "a": ["4+ piques, 6+ H, forcing 1 ronde", "5+ piques, forcing manche", "Fit cœur de soutien", "Main régulière 8–10 H"], "c": 0, "e": "1♠ sur 1♥ = 4+ piques, 6+ H, naturel, forcing 1 ronde.", "tip": "Reste au plus bas niveau pour garder de l’espace."}, {"q": "Après 1♥, que signifie 1SA ?", "a": ["Forcing manche", "6–10 H, non forcing", "11–12 H", "Texas"], "c": 1, "e": "Le document dit : 1SA = non forcing, main équilibrée ou sans fit.", "tip": "C’est un point-clé du système : ne pas surévaluer 1SA sur majeure."}, {"q": "Après 1♥, que montrent 2♣ / 2♦ ?", "a": ["Faibles et naturels", "5+ couleur, 10+ H, forcing manche", "Soutiens faibles", "Questions artificielles"], "c": 1, "e": "Le document les décrit comme 2/1 forcing manche.", "tip": "À niveau expert, pense “10+ H et 5+ couleur” si tu vois un 2/1 sur majeure."}, {"q": "Après 1♥, que signifie 2♥ ?", "a": ["3+ atouts, 6–9 H", "3+ atouts, 11–12 H", "4+ atouts, 4–8 H", "Manche imposée"], "c": 0, "e": "2♥ = soutien direct, 3+ atouts, 6–9 H.", "tip": "Le soutien simple = limite basse, pas invitation."}, {"q": "Après 1♥, que signifie 2SA ?", "a": ["11–12 H avec soutien 3+, invitation manche", "8–9 H réguliers", "13–15 H équilibrés sans fit", "Gerber"], "c": 0, "e": "Le tableau dit : soutien 3+, invitation manche, 11–12 H.", "tip": "Repère important : 2SA n’est pas ici une enchère naturelle sans fit."}, {"q": "Après 1♥, que montre 3♥ ?", "a": ["Invitation forte", "Soutien préemptif 4+ atouts, 4–8 H", "Manche directe faible", "Quantitative"], "c": 1, "e": "3♥ = soutien préemptif, 4+ atouts, 4–8 H.", "tip": "Cette enchère met la pression à l’adversaire et limite la main du répondant."}, {"q": "Après 1♥, que signifie 3SA ?", "a": ["13–15 H équilibrée, 2–3 atouts", "11–12 H sans fit", "17–18 H d’essai", "Question de chelem"], "c": 0, "e": "Le document indique 13–15 H équilibrée avec 2–3 atouts.", "tip": "Ne confonds pas avec une simple manche sans fit."}, {"q": "Après 1♥, comment est décrit 4♥ ?", "a": ["Barrage faible", "Main d’attaque distribuée, signoff", "Contrôle de chelem", "Étape quantitative"], "c": 1, "e": "Le tableau parle de 5+ atouts et d’une main d’attaque — signoff.", "tip": "C’est une décision de jouer, pas une exploration."}, {"q": "Dans ce tableau, un splinter sur majeure montre :", "a": ["soutien 3e + chicane", "soutien 4e + singleton/chicane", "main régulière d’invitation", "arrêt SA"], "c": 1, "e": "Le document l’écrit textuellement.", "tip": "Le splinter est défini par combinaison fit + courte."}, {"q": "Après 1SA, quel appel cherche une majeure 4e chez l’ouvreur ?", "a": ["2♦", "2♣", "2♥", "4♣"], "c": 1, "e": "Stayman 2♣ cherche une majeure 4e chez l’ouvreur.", "tip": "Le réflexe : d’abord rechercher les fits majeurs 4-4."}, {"q": "Après 1SA, que signifie 2♦ ?", "a": ["Texas vers les cœurs", "Naturel à carreau", "Invitation", "Transfert mineur"], "c": 0, "e": "2♦ = Texas vers les cœurs.", "tip": "Pour protéger la main forte, c’est l’ouvreur qui joue souvent le contrat majeur."}, {"q": "Après 1SA, que signifie se cible."}, {"q": "Parmi les conventions essentielles listées à la fin, laquelle est explicitement citée comme bicolore mineur défensif ?", "a": ["Support Double", "Unusual 2SA (UNT)", "Gerber", "Stayman"], "c": 1, "e": "La liste cite explicitement Unusual 2SA (UNT — bicolore mineur).", "tip": "Bonne case à cocher sur une fiche de convention moderne."}];
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
let quiz = [];
let current = 0;
let score = 0;
let locked = false;
const progressText = document.getElementById('progressText');
const scoreText = document.getElementById('scoreText');
const questionBox = document.getElementById('questionBox');
const answersBox = document.getElementById('answersBox');
const feedbackBox = document.getElementById('feedbackBox');
const progressBar = document.getElementById('progressBar');
const resultBox = document.getElementById('resultBox');
const nextBtn = document.getElementById('nextBtn');
const restartBtn = document.getElementById('restartBtn');
function startQuiz() {
  quiz = shuffle(allQuestions).slice(0, 20);
  current = 0;
  score = 0;
  resultBox.style.display = 'none';
  loadQuestion();
}
function loadQuestion() {
  locked = false;
  nextBtn.disabled = true;
  feedbackBox.className = 'feedback';
  feedbackBox.innerHTML = '';
  const q = quiz[current];
  progressText.textContent = 'Question ' + (current + 1) + ' / 20';
  scoreText.textContent = 'Score : ' + score;
  progressBar.style.width = ((current / 20) * 100) + '%';
  questionBox.textContent = q.q;
  answersBox.innerHTML = '';
  q.a.forEach((ans, idx) => {
    const btn = document.createElement('button');
    btn.textContent = ans;
    btn.onclick = () => answer(idx);
    answersBox.appendChild(btn);
  });
}
function answer(idx) {
  if (locked) return;
  locked = true;
  const q = quiz[current];
  const btns = answersBox.querySelectorAll('button');
  btns[q.c].classList.add('correct');
  if (idx !== q.c) btns[idx].classList.add('wrong');
  btns.forEach(b => b.disabled = true);
  const goodAnswer = q.a[q.c];
  if (idx === q.c) {
    score++;
    feedbackBox.className = 'feedback show good';
    feedbackBox.innerHTML = '<strong>✅ Correct</strong><br>' +
      '<b>Bonne réponse :</b> ' + goodAnswer + '<br>' +
      '<b>Pourquoi :</b> ' + q.e +
      '<div class="coach"><b>Conseil coach :</b> ' + q.tip + '</div>';
  } else {
    feedbackBox.className = 'feedback show bad';
    feedbackBox.innerHTML = '<strong>❌ Faux</strong><br>' +
      '<b>Bonne réponse :</b> ' + goodAnswer + '<br>' +
      '<b>Explication :</b> ' + q.e +
      '<div class="coach"><b>Conseil coach :</b> ' + q.tip + '</div>';
  }
  scoreText.textContent = 'Score : ' + score;
  progressBar.style.width = (((current + 1) / 20) * 100) + '%';
  setTimeout(() => { nextBtn.disabled = false; }, 500);
}
function nextQuestion() {
  current++;
  if (current >= 20) {
    showResult();
  } else {
    loadQuestion();
  }
}
function showResult() {
  questionBox.textContent = 'Quiz terminé';
  answersBox.innerHTML = '';
  feedbackBox.className = 'feedback';
  feedbackBox.innerHTML = '';
  nextBtn.disabled = true;
  const pct = Math.round((score / 20) * 100);
  let mention = 'À retravailler';
  let conseil = 'Refais une session en te concentrant sur une famille : SA, majeures, compétitives ou barrages.';
  if (pct >= 85) { mention = 'Excellent niveau'; conseil = 'Tu peux maintenant travailler la vitesse de décision et la précision en séquences concurrentielles.'; }
  else if (pct >= 65) { mention = 'Bon niveau'; conseil = 'Tu as les bases solides ; vise la régularité sur les détails de développements et de compétitives.'; }
  else if (pct >= 50) { mention = 'Base solide mais perfectible'; conseil = 'Reprends les tableaux 1♣/1♦, Texas/Stayman et 2♦ système des As.'; }
  resultBox.style.display = 'block';
  resultBox.innerHTML = '<h2>' + score + ' / 20 — ' + pct + '%</h2><p><b>' + mention + '</b></p><div class="tipbox"><b>Plan de travail coach :</b> ' + conseil + '</div><p class="small">Cette version tire 20 questions aléatoires parmi 100 questions uniques issues du SEF 2024 Joueur Moyen.</p>';
}
nextBtn.onclick = nextQuestion;
restartBtn.onclick = startQuiz;
startQuiz();
